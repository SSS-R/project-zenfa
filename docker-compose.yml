version: '3.8'

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: zenfa_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zenfa_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1

  # B2C FastAPI Backend (PC Lagbe? Portal)
  backend_b2c:
    build:
      context: ./backend_b2c
      dockerfile: Dockerfile
    container_name: zenfa_backend_b2c
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ${B2C_DATABASE_URL}
      REDIS_URL: ${B2C_REDIS_URL}
      SECRET_KEY: ${B2C_SECRET_KEY}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend_b2c:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 1

volumes:
  redis_data:
